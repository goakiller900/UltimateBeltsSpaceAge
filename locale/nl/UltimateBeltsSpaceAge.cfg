[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Voegt vijf transportbandniveaus boven de express-transportband toe, met bijpassende ondergrondse transportbanden en verdelers. Het snelste niveau draait zes keer zo snel als een express-transportband. Bijgewerkt voor Factorio 2.1 en Space Age; gebaseerd op Tyarns' UltimateBelts-mod.
