[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Añade cinco niveles de cintas transportadoras por encima de las cintas exprés, con cintas subterráneas y divisores correspondientes. El nivel más rápido funciona a seis veces la velocidad de una cinta exprés. Actualizado para Factorio 2.1 y Space Age; basado en el mod UltimateBelts de Tyarns.
