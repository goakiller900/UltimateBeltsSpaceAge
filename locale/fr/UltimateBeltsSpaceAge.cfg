[technology-description]
ultra-fast-logistics=Débloque les convoyeurs, convoyeurs souterrains et répartiteurs ultra-rapides. Deux fois la vitesse d’un convoyeur express.
extreme-fast-logistics=Débloque les convoyeurs, convoyeurs souterrains et répartiteurs extrêmement rapides. Trois fois la vitesse d’un convoyeur express.
ultra-express-logistics=Débloque les convoyeurs, convoyeurs souterrains et répartiteurs ultra-express. Quatre fois la vitesse d’un convoyeur express.
extreme-express-logistics=Débloque les convoyeurs, convoyeurs souterrains et répartiteurs express extrêmes. Cinq fois la vitesse d’un convoyeur express.
ultimate-logistics=Débloque les convoyeurs, convoyeurs souterrains et répartiteurs ultimes. Six fois la vitesse d’un convoyeur express.

