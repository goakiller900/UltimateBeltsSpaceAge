ultra-express-belt-beltbox=Débloque les empileurs ultra-express.
extreme-express-belt-beltbox=Débloque les empileurs express extrêmes.
ultimate-belt-beltbox=Débloque les empileurs ultimes.

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Ajoute cinq niveaux de convoyeurs au-delà des convoyeurs express, avec les convoyeurs souterrains et répartiteurs correspondants. Le niveau le plus rapide atteint six fois la vitesse d’un convoyeur express. Mis à jour pour Factorio 2.1 et Space Age ; basé sur le mod UltimateBelts de Tyarns.
