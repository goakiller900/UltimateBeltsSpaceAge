[technology-description]
ultra-fast-logistics=Schaltet ultraschnelle Fließbänder, unterirdische Fließbänder und Teiler frei. Doppelte Geschwindigkeit eines Express-Fließbands.
extreme-fast-logistics=Schaltet extrem schnelle Fließbänder, unterirdische Fließbänder und Teiler frei. Dreifache Geschwindigkeit eines Express-Fließbands.
ultra-express-logistics=Schaltet Ultra-Express-Fließbänder, unterirdische Fließbänder und Teiler frei. Vierfache Geschwindigkeit eines Express-Fließbands.
extreme-express-logistics=Schaltet Extrem-Express-Fließbänder, unterirdische Fließbänder und Teiler frei. Fünffache Geschwindigkeit eines Express-Fließbands.
ultimate-logistics=Schaltet ultimative Fließbänder, unterirdische Fließbänder und Teiler frei. Sechsfache Geschwindigkeit eines Express-Fließbands.

