ultimate-belt-beltbox=Schaltet ultimative Stapelboxen frei.

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Fügt fünf Fließbandstufen oberhalb des Express-Fließbands hinzu, einschließlich passender unterirdischer Fließbänder und Teiler. Die schnellste Stufe erreicht die sechsfache Geschwindigkeit eines Express-Fließbands. Aktualisiert für Factorio 2.1 und Space Age; basierend auf Tyarns' UltimateBelts-Mod.
