[technology-description]
ultra-fast-logistics=Відкриває надшвидкі конвеєри, підземні конвеєри та розподільники. Удвічі швидше за експрес-конвеєр.
extreme-fast-logistics=Відкриває екстремально швидкі конвеєри, підземні конвеєри та розподільники. Утричі швидше за експрес-конвеєр.
ultra-express-logistics=Відкриває ультраекспрес-конвеєри, підземні конвеєри та розподільники. У чотири рази швидше за експрес-конвеєр.
extreme-express-logistics=Відкриває екстремальні експрес-конвеєри, підземні конвеєри та розподільники. У п’ять разів швидше за експрес-конвеєр.
ultimate-logistics=Відкриває ультимативні конвеєри, підземні конвеєри та розподільники. У шість разів швидше за експрес-конвеєр.

ultra-fast-belt-beltbox=Відкриває надшвидкі укладачі.
extreme-fast-belt-beltbox=Відкриває екстремально швидкі укладачі.
ultra-express-belt-beltbox=Відкриває ультраекспрес-укладачі.
extreme-express-belt-beltbox=Відкриває екстремальні експрес-укладачі.
ultimate-belt-beltbox=Відкриває ультимативні укладачі.

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Додає п’ять рівнів конвеєрів вище за експрес-конвеєри, а також відповідні підземні конвеєри та розподільники. Найшвидший рівень працює у шість разів швидше за експрес-конвеєр. Оновлено для Factorio 2.1 і Space Age; засновано на моді UltimateBelts від Tyarns.
