[technology-description]
ultra-fast-logistics=초고속 운송 벨트, 지하 운송 벨트와 분배기를 해금합니다. 고속 운송 벨트 속도의 2배입니다.
extreme-fast-logistics=극고속 운송 벨트, 지하 운송 벨트와 분배기를 해금합니다. 고속 운송 벨트 속도의 3배입니다.
ultra-express-logistics=초특급 운송 벨트, 지하 운송 벨트와 분배기를 해금합니다. 고속 운송 벨트 속도의 4배입니다.
extreme-express-logistics=극특급 운송 벨트, 지하 운송 벨트와 분배기를 해금합니다. 고속 운송 벨트 속도의 5배입니다.
ultimate-logistics=궁극 운송 벨트, 지하 운송 벨트와 분배기를 해금합니다. 고속 운송 벨트 속도의 6배입니다.

ultra-fast-belt-beltbox=초고속 벨트박스를 해금합니다.
extreme-fast-belt-beltbox=극고속 벨트박스를 해금합니다.
ultra-express-belt-beltbox=초특급 벨트박스를 해금합니다.
extreme-express-belt-beltbox=극특급 벨트박스를 해금합니다.
ultimate-belt-beltbox=궁극 벨트박스를 해금합니다.

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=고속 운송 벨트보다 상위인 다섯 단계의 운송 벨트와 대응하는 지하 운송 벨트 및 분배기를 추가합니다. 가장 빠른 단계는 고속 운송 벨트 속도의 6배입니다. Factorio 2.1과 Space Age용으로 업데이트되었으며 Tyarns의 UltimateBelts 모드를 기반으로 합니다.
