[technology-description]
ultra-fast-logistics=Открывает сверхбыстрые конвейеры, подземные конвейеры и разделители. Вдвое быстрее экспресс-конвейера.
extreme-fast-logistics=Открывает экстремально быстрые конвейеры, подземные конвейеры и разделители. Втрое быстрее экспресс-конвейера.
ultra-express-logistics=Открывает сверхскоростные конвейеры, подземные конвейеры и разделители. В четыре раза быстрее экспресс-конвейера.
extreme-express-logistics=Открывает экстремальные экспресс-конвейеры, подземные конвейеры и разделители. В пять раз быстрее экспресс-конвейера.
ultimate-logistics=Открывает ультимативные конвейеры, подземные конвейеры и разделители. В шесть раз быстрее экспресс-конвейера.

ultra-fast-belt-beltbox=Открывает сверхбыстрые укладчики.
extreme-fast-belt-beltbox=Открывает экстремально быстрые укладчики.
ultra-express-belt-beltbox=Открывает сверхскоростные укладчики.
extreme-express-belt-beltbox=Открывает экстремальные экспресс-укладчики.
ultimate-belt-beltbox=Открывает ультимативные укладчики.

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Добавляет пять уровней конвейеров выше экспресс-конвейера, а также соответствующие подземные конвейеры и разделители. Самый быстрый уровень работает в шесть раз быстрее экспресс-конвейера. Обновлено для Factorio 2.1 и Space Age; основано на моде UltimateBelts от Tyarns.
