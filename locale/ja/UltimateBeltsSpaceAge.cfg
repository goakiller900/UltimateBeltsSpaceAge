[technology-description]
ultra-fast-logistics=ウルトラ高速搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの2倍の速度です。
extreme-fast-logistics=エクストリーム高速搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの3倍の速度です。
ultra-express-logistics=ウルトラエクスプレス搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの4倍の速度です。
extreme-express-logistics=エクストリームエクスプレス搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの5倍の速度です。
ultimate-logistics=アルティメット搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの6倍の速度です。

ultra-fast-belt-beltbox=ウルトラ高速ベルトボックスをアンロックします。
extreme-fast-belt-beltbox=エクストリーム高速ベルトボックスをアンロックします。
ultra-express-belt-beltbox=ウルトラエクスプレスベルトボックスをアンロックします。
extreme-express-belt-beltbox=エクストリームエクスプレスベルトボックスをアンロックします。
ultimate-belt-beltbox=アルティメットベルトボックスをアンロックします。

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=超高速搬送ベルトより上位の搬送ベルトを5段階追加し、対応する地下搬送ベルトと分配器も追加します。最上位は超高速搬送ベルトの6倍の速度です。Factorio 2.1とSpace Age向けに更新され、TyarnsのUltimateBeltsを基にしています。
