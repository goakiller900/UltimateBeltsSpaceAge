[technology-description]
ultra-fast-logistics=超高速搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの2倍の速度です。
extreme-fast-logistics=極高速搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの3倍の速度です。
ultra-express-logistics=超特急搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの4倍の速度です。
extreme-express-logistics=極特急搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの5倍の速度です。
ultimate-logistics=究極搬送ベルト、地下搬送ベルト、分配器をアンロックします。超高速搬送ベルトの6倍の速度です。

ultra-fast-belt-beltbox=超高速ベルトボックスをアンロックします。
extreme-fast-belt-beltbox=極高速ベルトボックスをアンロックします。
ultra-express-belt-beltbox=超特急ベルトボックスをアンロックします。
extreme-express-belt-beltbox=極特急ベルトボックスをアンロックします。
ultimate-belt-beltbox=究極ベルトボックスをアンロックします。

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=超高速搬送ベルトより上位の搬送ベルトを5段階追加し、対応する地下搬送ベルトと分配器も追加します。最上位は超高速搬送ベルトの6倍の速度です。Factorio 2.1とSpace Age向けに更新され、TyarnsのUltimateBeltsを基にしています。
