[mod-description]
UltimateBeltsSpaceAgePlus=Adiciona cinco níveis de esteiras transportadoras além das esteiras expressas, com esteiras subterrâneas e divisores correspondentes. O nível mais rápido opera a seis vezes a velocidade de uma esteira expressa. Atualizado para Factorio 2.1 e Space Age; baseado no mod UltimateBelts de Tyarns.
