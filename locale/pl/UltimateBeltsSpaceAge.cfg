[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Dodaje pięć poziomów taśmociągów ponad taśmociągi ekspresowe wraz z odpowiadającymi im podziemnymi taśmociągami i rozdzielaczami. Najszybszy poziom działa sześć razy szybciej niż taśmociąg ekspresowy. Zaktualizowano dla Factorio 2.1 i Space Age; na podstawie moda UltimateBelts autorstwa Tyarnsa.
