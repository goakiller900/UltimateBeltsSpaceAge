[technology-description]
ultra-fast-logistics=Unlocks ultra fast belts, underground belts and splitters. Twice express-belt speed.
extreme-fast-logistics=Unlocks extreme fast belts, underground belts and splitters. Three times express-belt speed.
ultra-express-logistics=Unlocks ultra express belts, underground belts and splitters. Four times express-belt speed.
extreme-express-logistics=Unlocks extreme express belts, underground belts and splitters. Five times express-belt speed.
ultimate-logistics=Unlocks ultimate belts, underground belts and splitters. Six times express-belt speed.

ultra-fast-belt-beltbox=Unlocks ultra fast beltboxes.
extreme-fast-belt-beltbox=Unlocks extreme fast beltboxes.
ultra-express-belt-beltbox=Unlocks ultra express beltboxes.
extreme-express-belt-beltbox=Unlocks extreme express beltboxes.
ultimate-belt-beltbox=Unlocks ultimate beltboxes.

[mod-name]
UltimateBeltsSpaceAgePlus=Ultimate Belts Space Age Plus

[mod-description]
UltimateBeltsSpaceAgePlus=Adds five transport-belt tiers beyond express belts, with matching underground belts and splitters. The fastest tier runs at six times express-belt speed. Updated for Factorio 2.1 and Space Age; based on Tyarns' UltimateBelts mod.
